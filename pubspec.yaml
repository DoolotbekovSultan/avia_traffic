name: aviatraffic
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  json_annotation: ^4.9.0
  get_it: ^8.0.0
  injectable: ^2.5.0
  dartz: ^0.10.1
  logger: ^2.5.0
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4
  dio: ^5.7.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  flutter_screenutil: ^5.9.3
  auto_route: ^9.2.2
  flutter_native_splash: ^2.3.10
  auto_size_text: ^3.0.0
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  flutter_local_notifications: ^17.2.4
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.3.0
  table_calendar: ^3.1.3
  intl: ^0.19.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  json_serializable: ^6.9.0
  build_runner: ^2.4.15
  injectable_generator: ^2.6.2
  auto_route_generator: ^9.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
  fonts:
    - family: NunitoSans
      fonts:
        - asset: assets/fonts/NunitoSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/NunitoSans-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/NunitoSans-Light.ttf
          weight: 300
        - asset: assets/fonts/NunitoSans-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/NunitoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NunitoSans-RegularItalic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/NunitoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NunitoSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/NunitoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NunitoSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/NunitoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/NunitoSans-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/NunitoSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/NunitoSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/NunitoSans-Black.ttf
          weight: 900
        - asset: assets/fonts/NunitoSans-BlackItalic.ttf
          weight: 900
          style: italic